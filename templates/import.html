<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM 导入 - 世界观数据库</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
:root {
  --bg-dark: #0d1117; --bg-card: #161b22; --bg-input: #21262d; --border: #30363d;
  --text: #e6edf3; --text-dim: #8b949e; --accent: #58a6ff; --accent-green: #3fb950; --accent-red: #f85149;
}
body { background: var(--bg-dark); color: var(--text); font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; padding: 20px; }
.container { max-width: 1200px; margin: 0 auto; }
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
textarea.form-control, input.form-control, select.form-select { background: var(--bg-input); border: 1px solid var(--border); color: var(--text); }
textarea.form-control:focus, input.form-control:focus, select.form-select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(88,166,255,0.3); }
.btn-primary { background: var(--accent); border: none; }
.btn-primary:hover { background: #79c0ff; }
.btn-success { background: var(--accent-green); border: none; }
.btn-danger { background: var(--accent-red); border: none; }
.step-indicator { display: flex; gap: 12px; margin-bottom: 24px; }
.step { display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 20px; background: var(--bg-input); color: var(--text-dim); font-size: 14px; }
.step.active { background: var(--accent); color: white; }
.step.completed { background: var(--accent-green); color: white; }
.step-num { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; background: rgba(255,255,255,0.2); }
.import-stats { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
.stat-badge { background: var(--bg-input); padding: 4px 12px; border-radius: 12px; font-size: 13px; }
.autocomplete-suggestions { position: absolute; z-index: 1000; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; max-height: 200px; overflow-y: auto; width: 100%; display: none; }
.autocomplete-suggestions .item { padding: 8px 12px; cursor: pointer; }
.autocomplete-suggestions .item:hover { background: var(--bg-input); }
.autocomplete-suggestions .item .meta { font-size: 11px; color: var(--text-dim); }
.nav-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
.nav-link { padding: 8px 16px; background: var(--bg-input); color: var(--text); text-decoration: none; border-radius: 20px; }
.nav-link.active { background: var(--accent); }
</style>
</head>
<body>
<div class="container">
  <div class="nav-bar">
    <a href="/" class="nav-link">首页</a>
    <a href="/add" class="nav-link">添加实体</a>
    <a href="/search" class="nav-link">搜索</a>
    <a href="/import" class="nav-link active">导入</a>
    <a href="/timeline" class="nav-link">时间线</a>
    <a href="/import" class="nav-link">导入</a><a href="/admin" class="nav-link">管理</a>
    <a href="/docs" class="nav-link">API文档</a>
  </div>

  <h1 style="margin-bottom:8px;">LLM 导入设定</h1>
  <p style="color:var(--text-dim);margin-bottom:24px;">粘贴世界观设定文本，由 AI 自动提取实体和关系，人工校验后批量入库。</p>

  <div class="step-indicator">
    <div class="step active" id="step1"><span class="step-num">1</span> 输入文本</div>
    <div class="step" id="step2"><span class="step-num">2</span> 预览编辑</div>
    <div class="step" id="step3"><span class="step-num">3</span> 确认导入</div>
  </div>

  <div class="card" id="step1-content">
    <h3>输入设定文本</h3>
    <textarea class="form-control" id="inputText" rows="15" placeholder="在此粘贴世界观设定文本..."></textarea>
    <div class="mt-3">
      <button class="btn btn-primary" onclick="previewExtract()">预览提取</button>
      <span id="previewStatus" style="margin-left:12px;color:var(--text-dim);"></span>
    </div>
  </div>

  <div class="card" id="step2-content" style="display:none;">
    <div class="d-flex justify-content-between align-items-start mb-3">
      <h3>预览结果</h3>
      <div class="import-stats">
        <span class="stat-badge" id="entityCount">实体: 0</span>
        <span class="stat-badge" id="relationCount">关系: 0</span>
      </div>
    </div>

    <ul class="nav nav-tabs" style="border-color:var(--border);">
      <li class="nav-item"><a class="nav-link active" style="color:var(--text);background:var(--bg-card);border-color:var(--border);" href="#tab-entities" data-bs-toggle="tab">实体</a></li>
      <li class="nav-item"><a class="nav-link" style="color:var(--text-dim);background:var(--bg-card);border-color:var(--border);" href="#tab-relations" data-bs-toggle="tab">关系</a></li>
    </ul>

    <div class="tab-content mt-3">
      <div class="tab-pane active" id="tab-entities">
        <div style="max-height:400px;overflow-y:auto;">
          <table class="table" id="entityTable">
            <thead><tr><th>标题</th><th>类型</th><th>重要性</th><th>标签</th><th>内容</th><th>操作</th></tr></thead>
            <tbody id="entityTableBody"></tbody>
          </table>
        </div>
        <button class="btn btn-outline-secondary btn-sm mt-2" onclick="addEntityRow()">+ 添加实体</button>
      </div>

      <div class="tab-pane" id="tab-relations">
        <div style="max-height:400px;overflow-y:auto;">
          <table class="table" id="relationTable">
            <thead><tr><th>源实体</th><th>目标实体</th><th>关系类型</th><th>描述</th><th>操作</th></tr></thead>
            <tbody id="relationTableBody"></tbody>
          </table>
        </div>
        <button class="btn btn-outline-secondary btn-sm mt-2" onclick="addRelationRow()">+ 添加关系</button>
      </div>
    </div>

    <div class="mt-3">
      <button class="btn btn-success" onclick="confirmImport()">确认导入</button>
      <button class="btn btn-secondary ms-2" onclick="resetAll()">重新开始</button>
      <span id="confirmStatus" style="margin-left:12px;color:var(--text-dim);"></span>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API_KEY = "{{ admin_key }}";
let entitiesData = [];
let relationsData = [];
const ETYPES = {"character":"人物","faction":"阵营","location":"地点","rule":"法则","event":"事件","item":"物品","concept":"概念","system":"体系"};
const EKEYS = Object.keys(ETYPES);
const CRELS = ["属于","位于","创建","领导","敌对","同盟","包含","相关","传承","师徒","所属"];

async function previewExtract() {
  const text = document.getElementById("inputText").value.trim();
  if (!text) { alert("请先输入设定文本"); return; }
  document.getElementById("previewStatus").textContent = "正在调用 AI 提取...";
  try {
    const resp = await fetch("/api/import/preview?api_key="+encodeURIComponent(API_KEY), {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({text:text})
    });
    const data = await resp.json();
    if (data.error) { alert("提取出错: "+data.error); document.getElementById("previewStatus").textContent = ""; return; }
    entitiesData = data.entities || [];
    relationsData = data.relations || [];
    renderAll();
    document.getElementById("step1").className = "step completed";
    document.getElementById("step2").className = "step active";
    document.getElementById("step1-content").style.display = "none";
    document.getElementById("step2-content").style.display = "block";
    document.getElementById("previewStatus").textContent = "";
  } catch(e) { alert("请求失败: "+e.message); document.getElementById("previewStatus").textContent = ""; }
}

function renderAll() {
  // Entities
  const etb = document.getElementById("entityTableBody");
  etb.innerHTML = entitiesData.map((e,i) => {
    const opts = EKEYS.map(k => "<option "+(k===e.type?"selected":"")+" value=""+k+"">"+ETYPES[k]+"</option>").join("");
    return "<tr><td><input class='form-control form-control-sm' value=""+esc(e.title)+"" onchange='ed("+i+","title",this.value)'></td>"+
      "<td><select class='form-select form-select-sm' onchange='ed("+i+","type",this.value)'>"+opts+"</select></td>"+
      "<td><input type='range' min='1' max='5' value='"+e.importance+"' oninput='ed("+i+","importance",parseInt(this.value))' style='width:80px'><span style='font-size:12px;margin-left:4px;'>"+e.importance+"</span></td>"+
      "<td><input class='form-control form-control-sm' value=""+esc((e.tags||[]).join(","))+"" placeholder='逗号分隔' onchange='etags("+i+",this.value)'></td>"+
      "<td><input class='form-control form-control-sm' value=""+esc(e.content||"")+"" placeholder='描述' onchange='ed("+i+","content",this.value)'></td>"+
      "<td><button class='btn btn-danger btn-sm' onclick='dele("+i+")'>删除</button></td></tr>";
  }).join("");
  // Relations
  const rtb = document.getElementById("relationTableBody");
  rtb.innerHTML = relationsData.map((r,i) => {
    return "<tr><td><div style='position:relative'><input class='form-control form-control-sm' value=""+esc(r.source)+"" placeholder='源实体' data-ri='"+i+"' data-rf='source' oninput='onAC(this)'><div class='autocomplete-suggestions' id='s-"+i+"-source'></div></div></td>"+
      "<td><div style='position:relative'><input class='form-control form-control-sm' value=""+esc(r.target)+"" placeholder='目标实体' data-ri='"+i+"' data-rf='target' oninput='onAC(this)'><div class='autocomplete-suggestions' id='s-"+i+"-target'></div></div></td>"+
      "<td><input class='form-control form-control-sm' list='crels' value=""+esc(r.relation_type)+"" onchange='rd("+i+","relation_type",this.value)'><datalist id='crels'>"+CRELS.map(c=>"<option>"+c+"</option>").join("")+"</datalist></td>"+
      "<td><input class='form-control form-control-sm' value=""+esc(r.description||"")+"" onchange='rd("+i+","description",this.value)'></td>"+
      "<td><button class='btn btn-danger btn-sm' onclick='delr("+i+")'>删除</button></td></tr>";
  }).join("");
  document.getElementById("entityCount").textContent = "实体: "+entitiesData.length;
  document.getElementById("relationCount").textContent = "关系: "+relationsData.length;
}

function esc(s) { return (s||"").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function ed(i,f,v) { entitiesData[i][f]=v; }
function etags(i,v) { entitiesData[i].tags=v.split(",").map(t=>t.trim()).filter(Boolean); }
function dele(i) { entitiesData.splice(i,1); renderAll(); }
function rd(i,f,v) { relationsData[i][f]=v; }
function delr(i) { relationsData.splice(i,1); renderAll(); }
function addEntityRow() { entitiesData.push({title:"",type:"concept",content:"",tags:[],importance:3}); renderAll(); }
function addRelationRow() { relationsData.push({source:"",target:"",relation_type:"相关",description:""}); renderAll(); }

let acTimer = null;
function onAC(el) {
  clearTimeout(acTimer);
  const v = el.value.trim(), ri = el.dataset.ri, rf = el.dataset.rf;
  const sid = "s-"+ri+"-"+rf;
  const sb = document.getElementById(sid);
  if (!v||v.length<1) { sb.style.display="none"; return; }
  acTimer = setTimeout(async ()=>{
    try {
      const resp = await fetch("/api/search/quick?q="+encodeURIComponent(v)+"&api_key="+encodeURIComponent(API_KEY));
      const items = await resp.json();
      sb.innerHTML = items.map(item=>"<div class='item' onclick='sa(""+sid+"",""+ri+"",""+rf+"",""+item.title+"")'><strong>"+item.title+"</strong><span class='meta'> "+ETYPES[item.entity_type]+"</span></div>").join("");
      sb.style.display = items.length?"block":"none";
    } catch(e) { sb.style.display="none"; }
  }, 250);
}
function sa(sid,ri,rf,title) {
  relationsData[parseInt(ri)][rf] = title;
  renderAll();
}

async function confirmImport() {
  if (!entitiesData.length) { alert("没有实体可以导入"); return; }
  document.getElementById("confirmStatus").textContent = "正在导入...";
  try {
    const resp = await fetch("/api/import/confirm?api_key="+encodeURIComponent(API_KEY), {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({entities:entitiesData,relations:relationsData})
    });
    const result = await resp.json();
    if (result.success) {
      document.getElementById("step2").className = "step completed";
      document.getElementById("step3").className = "step active";
      document.getElementById("confirmStatus").innerHTML = "<span style='color:var(--accent-green);'>导入成功！创建了 "+result.created_entities+" 个实体，"+result.created_relations+" 个关系</span>";
      entitiesData = []; relationsData = [];
    } else {
      document.getElementById("confirmStatus").innerHTML = "<span style='color:var(--accent-red);'>导入失败</span>";
    }
  } catch(e) { document.getElementById("confirmStatus").innerHTML = "<span style='color:var(--accent-red);'>请求失败: "+e.message+"</span>"; }
}

function resetAll() {
  entitiesData = []; relationsData = [];
  document.getElementById("inputText").value = "";
  document.getElementById("step1").className = "step active";
  document.getElementById("step2").className = "step";
  document.getElementById("step3").className = "step";
  document.getElementById("step1-content").style.display = "block";
  document.getElementById("step2-content").style.display = "none";
  document.getElementById("confirmStatus").textContent = "";
}
</script>

<script>
// === Mode switcher: ?mode=admin|user (Phase 3.2) ===
(function() {
  const urlParams = new URLSearchParams(window.location.search);
  const modeParam = urlParams.get("mode");
  const savedMode = localStorage.getItem("worldview_mode");
  const defaultMode = modeParam || savedMode || "user";
  localStorage.setItem("worldview_mode", defaultMode);
  const isAdmin = defaultMode === "admin";
  
  // Toggle visibility of admin-only elements
  document.querySelectorAll(".admin-only").forEach(el => {
    el.style.display = isAdmin ? "" : "none";
  });
  
  // Add mode indicator + toggle
  const header = document.querySelector("header") || document.querySelector("h1") || document.body;
  const modeBar = document.createElement("div");
  modeBar.style.cssText = "text-align:right;margin-bottom:10px;font-size:12px;display:flex;justify-content:flex-end;align-items:center;gap:10px;flex-wrap:wrap;";
  modeBar.innerHTML = \`
    <span style="color:var(--text-dim, #666);">
      Mode: <strong>\${isAdmin ? "管理员" : "用户"}</strong>
      <a href="?mode=\${isAdmin ? "user" : "admin"}" style="margin-left:4px;color:#667eea;text-decoration:none;font-size:11px;">[\${isAdmin ? "切换到用户" : "切换到管理"}]</a>
    </span>
  \`;
  if (header && header.parentNode) {
    header.parentNode.insertBefore(modeBar, header.nextSibling);
  }
})();
</script>
</body>
</html>
